</button>

<div class="space-y-2">

<input class="w-full px-4 py-3.5 bg-white border border-secondary-container rounded-xl focus:ring-2 focus:ring-secondary-container/50 focus:border-secondary outline-none transition-all placeholder:text-outline-variant font-body-md text-body-md" id="email" placeholder="hello@mahdhiya.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label-lg text-label-lg text-on-surface" for="password">Password</label>
<a class="font-label-md text-label-md text-secondary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full px-4 py-3.5 bg-white border border-secondary-container rounded-xl focus:ring-2 focus:ring-secondary-container/50 focus:border-secondary outline-none transition-all placeholder:text-outline-variant font-body-md text-body-md" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full bg-primary text-on-primary font-label-lg text-label-lg py-4 rounded-xl shadow-[0_4px_12px_rgba(0,6,102,0.15)] hover:shadow-[0_6px_20px_rgba(0,6,102,0.25)] transition-all active:scale-[0.98] mt-4" type="submit">
